name: telstream
description: "Stream Telegram videos seamlessly using a high-performance built-in media player powered by TDLib and MediaKit."
publish_to: 'none'

version: 2.10.4+47

environment:
  sdk: ^3.12.1


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  ffi: ^2.1.2
  tdlib: ^1.6.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  flutter_riverpod: ^3.3.2
  path_provider: ^2.1.5
  intl: 0.20.2
  url_launcher: ^6.3.2
  file_picker: ^8.0.7
  permission_handler: ^12.0.3
  screen_brightness: ^2.1.10
  flutter_volume_controller: ^2.0.1
  connectivity_plus: ^6.0.3
  http: ^1.2.1
  palette_generator: ^0.3.3+7
  country_picker: ^2.0.28
  archive: ^3.6.1
  device_info_plus: ^11.0.0
  flutter_secure_storage: ^10.0.0
  synchronized: ^3.1.0
  crypto: ^3.0.7
  wakelock_plus: ^1.2.8
  youtube_player_iframe: ^6.0.2
  cached_network_image: ^3.4.1
  package_info_plus: ^9.0.1
  collection: ^1.19.1
  window_manager: ^0.5.2
  encrypt: ^5.0.3
  ed25519_edwards: ^0.3.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  translator: ^1.0.4+1
  build_runner: ^2.15.1
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/fonts/Roboto-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#020617"
  android: true
  ios: true
  android_12:
    color: "#020617"

dependency_overrides:
  media_kit_libs_android_video:
    git:
      url: https://github.com/media-kit/media-kit.git
      ref: main
      path: libs/android/media_kit_libs_android_video
