name: Build & Release App

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate Secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.SENTRY_DSN }}" ]; then
            echo "Warning: SENTRY_DSN is not set. Crash reporting will be disabled."
          fi
          if [ -z "${{ secrets.TELEGRAM_API_ID }}" ] || [ -z "${{ secrets.TMDB_API_KEY }}" ]; then
            echo "Error: CI Secrets are missing."
            exit 1
          fi

      - name: Create Secrets file
        run: |
          mkdir -p lib/core
          echo "class Secrets { static const int apiId = ${{ secrets.TELEGRAM_API_ID }}; static const String apiHash = '${{ secrets.TELEGRAM_API_HASH }}'; static const String buildTag = 'Build #${{ github.run_number }}'; static const int animeChannelId = ${{ secrets.ANIME_CHANNEL_ID }}; static const String animeInviteLink = '${{ secrets.ANIME_INVITE_LINK }}'; static const int movieChannelId = ${{ secrets.MOVIE_CHANNEL_ID }}; static const String movieInviteLink = '${{ secrets.MOVIE_INVITE_LINK }}'; static const int webSeriesChannelId = ${{ secrets.WEBSERIES_CHANNEL_ID }}; static const String webSeriesInviteLink = '${{ secrets.WEBSERIES_INVITE_LINK }}'; static const String tmdbApiKey = '${{ secrets.TMDB_API_KEY }}'; static const String traktApiKey = '${{ secrets.TRAKT_API_KEY }}'; static const String malClientId = '${{ secrets.MAL_CLIENT_ID }}'; static const int adminUserId = ${{ secrets.ADMIN_USER_ID }}; static const String updatePublicKey = '${{ secrets.UPDATE_PUBLIC_KEY }}'; static const String sentryDsn = '${{ secrets.SENTRY_DSN }}'; }" > lib/core/secrets.dart

      - name: Run code analysis (Linter)
        run: flutter analyze

      - name: Run unit tests
        run: flutter test --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks



      - name: Download libtdjson.so prebuilt binaries
        run: |
          set -euo pipefail
          TDLIB_VERSION="v1.8.52"
          BASE_URL="https://github.com/up9cloud/android-libtdjson/releases/download/${TDLIB_VERSION}"
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p android/app/src/main/jniLibs/x86_64
          curl -fL "${BASE_URL}/jniLibs.tar.gz" -o /tmp/jniLibs.tar.gz
          tar -xzf /tmp/jniLibs.tar.gz -C /tmp
          cp /tmp/jniLibs/arm64-v8a/libtdjson.so android/app/src/main/jniLibs/arm64-v8a/
          cp /tmp/jniLibs/armeabi-v7a/libtdjson.so android/app/src/main/jniLibs/armeabi-v7a/
          cp /tmp/jniLibs/x86_64/libtdjson.so android/app/src/main/jniLibs/x86_64/ || true
          # Verify all ABIs present
          for abi in arm64-v8a armeabi-v7a; do
            test -f "android/app/src/main/jniLibs/${abi}/libtdjson.so" || { echo "ERROR: libtdjson.so missing for ${abi}"; exit 1; }
          done

      - name: Verify libtdjson.so presence
        run: ls -lh android/app/src/main/jniLibs/*/libtdjson.so

      - name: Build Split APKs (ARM64 and ARM32)
        env:
          KEYSTORE_FILE: upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --split-per-abi --target-platform android-arm,android-arm64,android-x64 --release --build-number=${{ github.run_number }} --dart-define=FIREBASE_DB_URL=${{ secrets.FIREBASE_DB_URL }} --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/telstream-arm64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/telstream-arm32.apk

      - name: Upload Android APKs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            build/app/outputs/flutter-apk/telstream-arm64.apk
            build/app/outputs/flutter-apk/telstream-arm32.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Validate Secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.TELEGRAM_API_ID }}" ] || [ -z "${{ secrets.TMDB_API_KEY }}" ]; then
            echo "Error: CI Secrets are missing."
            exit 1
          fi

      - name: Create Secrets file
        shell: bash
        run: |
          mkdir -p lib/core
          echo "class Secrets { static const int apiId = ${{ secrets.TELEGRAM_API_ID }}; static const String apiHash = '${{ secrets.TELEGRAM_API_HASH }}'; static const String buildTag = 'Build #${{ github.run_number }}'; static const int animeChannelId = ${{ secrets.ANIME_CHANNEL_ID }}; static const String animeInviteLink = '${{ secrets.ANIME_INVITE_LINK }}'; static const int movieChannelId = ${{ secrets.MOVIE_CHANNEL_ID }}; static const String movieInviteLink = '${{ secrets.MOVIE_INVITE_LINK }}'; static const int webSeriesChannelId = ${{ secrets.WEBSERIES_CHANNEL_ID }}; static const String webSeriesInviteLink = '${{ secrets.WEBSERIES_INVITE_LINK }}'; static const String tmdbApiKey = '${{ secrets.TMDB_API_KEY }}'; static const String traktApiKey = '${{ secrets.TRAKT_API_KEY }}'; static const String malClientId = '${{ secrets.MAL_CLIENT_ID }}'; static const int adminUserId = ${{ secrets.ADMIN_USER_ID }}; static const String updatePublicKey = '${{ secrets.UPDATE_PUBLIC_KEY }}'; static const String sentryDsn = '${{ secrets.SENTRY_DSN }}'; }" > lib/core/secrets.dart

      - name: Fetch TDLib Windows DLLs
        shell: pwsh
        run: |
          $libsDir = "windows\runner\libs"
          New-Item -ItemType Directory -Force -Path $libsDir

          $baseUrl = "https://raw.githubusercontent.com/WorkerOfArea51/TelStream/native-libs-win/windows/runner/libs"

          $dlls = @("tdjson.dll", "libcrypto-1_1-x64.dll", "libssl-1_1-x64.dll", "msvcp140.dll", "zlib1.dll")

          foreach ($dll in $dlls) {
            Write-Host "Downloading $dll..."
            Invoke-WebRequest -Uri "$baseUrl/$dll" -OutFile (Join-Path $libsDir $dll)
          }

          Get-ChildItem $libsDir -Filter *.dll | ForEach-Object {
            Write-Host "  $($_.Name) - $([math]::Round($_.Length / 1MB, 2))MB"
          }

      - name: Build Windows Application
        run: flutter build windows --release --dart-define=FIREBASE_DB_URL=${{ secrets.FIREBASE_DB_URL }} --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}



      - name: Build Windows Installer (EXE)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" windows/runner/installer.iss

      - name: Upload Windows Installer as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: ./build/telstream-setup.exe

  create-release:
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./release_assets

      - name: Set up Flutter (for version parsing helper)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Extract App Version from pubspec.yaml
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate checksums.txt
        run: |
          cd release_assets
          sha256sum * > checksums.txt
          cd ..

      - name: Generate Changelog
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: python build_changelog.py

      - name: Generate jsDelivr fallback stub
        run: |
          echo "{\"version\": \"$APP_VERSION\", \"build\": $GITHUB_RUN_NUMBER}" > ./release_assets/latest_release.json

      - name: Create Unified GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}-build.${{ github.run_number }}
          name: TelStream Release v${{ env.APP_VERSION }} #${{ github.run_number }}
          body_path: ./extracted_changelog.md
          files: |
            ./release_assets/telstream-arm64.apk
            ./release_assets/telstream-arm32.apk
            ./release_assets/telstream-setup.exe
            ./release_assets/checksums.txt
            ./release_assets/latest_release.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
