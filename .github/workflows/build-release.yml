name: Build & Release App

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create Secrets file
        run: |
          mkdir -p lib/core
          echo "class Secrets { static const int apiId = ${{ secrets.TELEGRAM_API_ID }}; static const String apiHash = '${{ secrets.TELEGRAM_API_HASH }}'; static const String buildTag = 'Build #${{ github.run_number }}'; static const int animeChannelId = ${{ secrets.ANIME_CHANNEL_ID || -1002633457020 }}; static const String animeInviteLink = '${{ secrets.ANIME_INVITE_LINK || 'https://t.me/+AkdK7gDbYWRmZTc1' }}'; static const int movieChannelId = ${{ secrets.MOVIE_CHANNEL_ID || -1004421932120 }}; static const String movieInviteLink = '${{ secrets.MOVIE_INVITE_LINK || 'https://t.me/+dx2YihneVQczNTM1' }}'; static const int webSeriesChannelId = ${{ secrets.WEBSERIES_CHANNEL_ID || -1004440703680 }}; static const String webSeriesInviteLink = '${{ secrets.WEBSERIES_INVITE_LINK || 'https://t.me/+FiQ7kG8Ofh5jMDU1' }}'; static const String tmdbApiKey = '${{ secrets.TMDB_API_KEY || 'YOUR_TMDB_API_KEY' }}'; }" > lib/core/secrets.dart

      - name: Run code analysis (Linter)
        run: flutter analyze
        continue-on-error: true

      - name: Run unit tests
        run: flutter test

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build Split APKs (ARM64 and ARM32)
        env:
          KEYSTORE_FILE: upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --split-per-abi --target-platform android-arm,android-arm64 --release --build-number=${{ github.run_number }}
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/telstream-arm64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/telstream-arm32.apk

      - name: Upload Android APKs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            build/app/outputs/flutter-apk/telstream-arm64.apk
            build/app/outputs/flutter-apk/telstream-arm32.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create Secrets file
        shell: bash
        run: |
          mkdir -p lib/core
          echo "class Secrets { static const int apiId = ${{ secrets.TELEGRAM_API_ID }}; static const String apiHash = '${{ secrets.TELEGRAM_API_HASH }}'; static const String buildTag = 'Build #${{ github.run_number }}'; static const int animeChannelId = ${{ secrets.ANIME_CHANNEL_ID || -1002633457020 }}; static const String animeInviteLink = '${{ secrets.ANIME_INVITE_LINK || 'https://t.me/+AkdK7gDbYWRmZTc1' }}'; static const int movieChannelId = ${{ secrets.MOVIE_CHANNEL_ID || -1004421932120 }}; static const String movieInviteLink = '${{ secrets.MOVIE_INVITE_LINK || 'https://t.me/+dx2YihneVQczNTM1' }}'; static const int webSeriesChannelId = ${{ secrets.WEBSERIES_CHANNEL_ID || -1004440703680 }}; static const String webSeriesInviteLink = '${{ secrets.WEBSERIES_INVITE_LINK || 'https://t.me/+FiQ7kG8Ofh5jMDU1' }}'; static const String tmdbApiKey = '${{ secrets.TMDB_API_KEY || 'YOUR_TMDB_API_KEY' }}'; }" > lib/core/secrets.dart

      - name: Build Windows Application
        run: flutter build windows --release

      - name: Fetch prebuilt Windows tdjson.dll
        shell: pwsh
        run: |
          # Use pip to download the Windows x64 wheel of tdjson which bundles the DLL securely
          pip download tdjson --only-binary=:all: --platform win_amd64 --dest ./tdjson_temp
          $wheel = Get-ChildItem ./tdjson_temp/*.whl | Select-Object -First 1
          # Rename the wheel to .zip to extract it
          Rename-Item $wheel.FullName ($wheel.BaseName + ".zip")
          Expand-Archive -Path ./tdjson_temp/*.zip -DestinationPath ./tdjson_extracted
          
          # Copy all DLL files recursively to target release directory
          Get-ChildItem -Path ./tdjson_extracted -Filter *.dll -Recurse | Copy-Item -Destination ./build/windows/x64/runner/Release/
          
          # Find the main hashed tdjson-*.dll file and rename it back to tdjson.dll
          $mainDll = Get-ChildItem -Path ./build/windows/x64/runner/Release -Filter tdjson-*.dll | Select-Object -First 1
          if ($mainDll -eq $null) {
            throw "Failed to locate tdjson-*.dll inside the copied files"
          }
          Rename-Item $mainDll.FullName "tdjson.dll"
          
          # Confirm it exists
          if (Test-Path ./build/windows/x64/runner/Release/tdjson.dll) {
            Write-Host "Successfully bundled tdjson.dll and dependencies!"
          } else {
            throw "Failed to verify tdjson.dll bundling"
          }

      - name: Build Windows Installer (EXE)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" windows/runner/installer.iss

      - name: Upload Windows Installer as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: ./build/telstream-setup.exe

  create-release:
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./release_assets

      - name: Set up Flutter (for version parsing helper)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Extract App Version from pubspec.yaml
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate Changelog
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: python build_changelog.py

      - name: Create Unified GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}-build.${{ github.run_number }}
          name: TelStream Release v${{ env.APP_VERSION }} #${{ github.run_number }}
          body_path: ./extracted_changelog.md
          files: |
            ./release_assets/telstream-arm64.apk
            ./release_assets/telstream-arm32.apk
            ./release_assets/telstream-setup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
