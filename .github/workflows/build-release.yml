name: Build & Release Android App

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Extract App Version from pubspec.yaml
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Secrets file
        run: |
          mkdir -p lib/core
          echo "class Secrets { static const int apiId = ${{ secrets.TELEGRAM_API_ID }}; static const String apiHash = '${{ secrets.TELEGRAM_API_HASH }}'; static const String buildTag = 'Build #${{ github.run_number }}'; static const int animeChannelId = ${{ secrets.ANIME_CHANNEL_ID }}; static const String animeInviteLink = '${{ secrets.ANIME_INVITE_LINK }}'; }" > lib/core/secrets.dart

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Build Split APKs (ARM64 and ARM32)
        env:
          KEYSTORE_FILE: upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --split-per-abi --target-platform android-arm,android-arm64 --release --build-number=${{ github.run_number }}
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/telstream-arm64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/telstream-arm32.apk

      - name: Generate Changelog
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python -c "
          import re, os
          with open('lib/core/constants.dart', 'r', encoding='utf-8') as f:
              content = f.read()
          match = re.search(r\"static const String changelog = '''(.*?)''';\", content, re.DOTALL)
          changelog = match.group(1).strip() if match else 'No detailed changelog provided.'
          
          app_version = os.environ.get('APP_VERSION', '')
          run_number = os.environ.get('GITHUB_RUN_NUMBER', '')
          ref_name = os.environ.get('GITHUB_REF_NAME', '')
          sha = os.environ.get('GITHUB_SHA', '')
          
          build_info = '\n\n---\n\n### 🛠️ Build Information\n- **Version:** `v' + app_version + '`\n- **Build Number:** `#' + run_number + '`\n- **Branch:** `' + ref_name + '`\n- **Commit SHA:** `' + sha + '`\n\n### 📲 Downloads\n- **ARM64 APK:** Optimized for modern 64-bit ARM devices (arm64-v8a).\n- **ARM32 APK:** Optimized for older 32-bit ARM devices (armeabi-v7a).\n'
          
          with open('extracted_changelog.md', 'w', encoding='utf-8') as out:
              out.write(changelog + build_info)
          "

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}-build.${{ github.run_number }}
          name: TelStream Release v${{ env.APP_VERSION }} #${{ github.run_number }}
          body_path: ./extracted_changelog.md
          files: |
            build/app/outputs/flutter-apk/telstream-arm64.apk
            build/app/outputs/flutter-apk/telstream-arm32.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
