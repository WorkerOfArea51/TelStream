name: Build & Release App

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create Secrets file
        run: |
          mkdir -p lib/core
          echo "class Secrets { static const int apiId = ${{ secrets.TELEGRAM_API_ID }}; static const String apiHash = '${{ secrets.TELEGRAM_API_HASH }}'; static const String buildTag = 'Build #${{ github.run_number }}'; static const int animeChannelId = ${{ secrets.ANIME_CHANNEL_ID || -1002633457020 }}; static const String animeInviteLink = '${{ secrets.ANIME_INVITE_LINK || 'https://t.me/+AkdK7gDbYWRmZTc1' }}'; static const int movieChannelId = ${{ secrets.MOVIE_CHANNEL_ID || -1004421932120 }}; static const String movieInviteLink = '${{ secrets.MOVIE_INVITE_LINK || 'https://t.me/+dx2YihneVQczNTM1' }}'; static const int webSeriesChannelId = ${{ secrets.WEBSERIES_CHANNEL_ID || -1004440703680 }}; static const String webSeriesInviteLink = '${{ secrets.WEBSERIES_INVITE_LINK || 'https://t.me/+FiQ7kG8Ofh5jMDU1' }}'; static const String tmdbApiKey = '${{ secrets.TMDB_API_KEY || 'YOUR_TMDB_API_KEY' }}'; static const String traktApiKey = '${{ secrets.TRAKT_API_KEY || '05553e1be851c22a76f7df2b8a7c29be60cb5038ecbe6e80b2a7587dfb38ea47' }}'; static const String malClientId = '${{ secrets.MAL_CLIENT_ID || '829f046ef3294326127b407137f62c0a' }}'; static const int adminUserId = ${{ secrets.ADMIN_USER_ID || 123456789 }}; static const String updatePublicKey = '${{ secrets.UPDATE_PUBLIC_KEY || 'ed25519-public-key-hex-goes-here' }}'; }" > lib/core/secrets.dart

      - name: Run code analysis (Linter)
        run: flutter analyze
        continue-on-error: true

      - name: Run unit tests
        run: flutter test

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks



      - name: Download libtdjson.so prebuilt binaries
        run: |
          set -euo pipefail
          TDLIB_VERSION="v1.8.52"
          BASE_URL="https://github.com/up9cloud/android-libtdjson/releases/download/${TDLIB_VERSION}"
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p android/app/src/main/jniLibs/x86_64
          curl -fL "${BASE_URL}/jniLibs.tar.gz" -o /tmp/jniLibs.tar.gz
          tar -xzf /tmp/jniLibs.tar.gz -C /tmp
          cp /tmp/jniLibs/arm64-v8a/libtdjson.so android/app/src/main/jniLibs/arm64-v8a/
          cp /tmp/jniLibs/armeabi-v7a/libtdjson.so android/app/src/main/jniLibs/armeabi-v7a/
          cp /tmp/jniLibs/x86_64/libtdjson.so android/app/src/main/jniLibs/x86_64/ || true
          # Verify all ABIs present
          for abi in arm64-v8a armeabi-v7a; do
            test -f "android/app/src/main/jniLibs/${abi}/libtdjson.so" || { echo "ERROR: libtdjson.so missing for ${abi}"; exit 1; }
          done

      - name: Verify libtdjson.so presence
        run: ls -lh android/app/src/main/jniLibs/*/libtdjson.so

      - name: Build Split APKs (ARM64 and ARM32)
        env:
          KEYSTORE_FILE: upload-keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --split-per-abi --target-platform android-arm,android-arm64,android-x64 --release --build-number=${{ github.run_number }} --dart-define=FIREBASE_DB_URL=${{ secrets.FIREBASE_DB_URL }}
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/telstream-arm64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/telstream-arm32.apk

      - name: Upload Android APKs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            build/app/outputs/flutter-apk/telstream-arm64.apk
            build/app/outputs/flutter-apk/telstream-arm32.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create Secrets file
        shell: bash
        run: |
          mkdir -p lib/core
          echo "class Secrets { static const int apiId = ${{ secrets.TELEGRAM_API_ID }}; static const String apiHash = '${{ secrets.TELEGRAM_API_HASH }}'; static const String buildTag = 'Build #${{ github.run_number }}'; static const int animeChannelId = ${{ secrets.ANIME_CHANNEL_ID || -1002633457020 }}; static const String animeInviteLink = '${{ secrets.ANIME_INVITE_LINK || 'https://t.me/+AkdK7gDbYWRmZTc1' }}'; static const int movieChannelId = ${{ secrets.MOVIE_CHANNEL_ID || -1004421932120 }}; static const String movieInviteLink = '${{ secrets.MOVIE_INVITE_LINK || 'https://t.me/+dx2YihneVQczNTM1' }}'; static const int webSeriesChannelId = ${{ secrets.WEBSERIES_CHANNEL_ID || -1004440703680 }}; static const String webSeriesInviteLink = '${{ secrets.WEBSERIES_INVITE_LINK || 'https://t.me/+FiQ7kG8Ofh5jMDU1' }}'; static const String tmdbApiKey = '${{ secrets.TMDB_API_KEY || 'YOUR_TMDB_API_KEY' }}'; static const String traktApiKey = '${{ secrets.TRAKT_API_KEY || '05553e1be851c22a76f7df2b8a7c29be60cb5038ecbe6e80b2a7587dfb38ea47' }}'; static const String malClientId = '${{ secrets.MAL_CLIENT_ID || '829f046ef3294326127b407137f62c0a' }}'; static const int adminUserId = ${{ secrets.ADMIN_USER_ID || 123456789 }}; static const String updatePublicKey = '${{ secrets.UPDATE_PUBLIC_KEY || 'ed25519-public-key-hex-goes-here' }}'; }" > lib/core/secrets.dart

      - name: Build Windows Application
        run: flutter build windows --release --dart-define=FIREBASE_DB_URL=${{ secrets.FIREBASE_DB_URL }}



      - name: Build Windows Installer (EXE)
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" windows/runner/installer.iss

      - name: Upload Windows Installer as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: ./build/telstream-setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Create Secrets file
        run: |
          mkdir -p lib/core
          echo "class Secrets { static const int apiId = ${{ secrets.TELEGRAM_API_ID }}; static const String apiHash = '${{ secrets.TELEGRAM_API_HASH }}'; static const String buildTag = 'Build #${{ github.run_number }}'; static const int animeChannelId = ${{ secrets.ANIME_CHANNEL_ID || -1002633457020 }}; static const String animeInviteLink = '${{ secrets.ANIME_INVITE_LINK || 'https://t.me/+AkdK7gDbYWRmZTc1' }}'; static const int movieChannelId = ${{ secrets.MOVIE_CHANNEL_ID || -1004421932120 }}; static const String movieInviteLink = '${{ secrets.MOVIE_INVITE_LINK || 'https://t.me/+dx2YihneVQczNTM1' }}'; static const int webSeriesChannelId = ${{ secrets.WEBSERIES_CHANNEL_ID || -1004440703680 }}; static const String webSeriesInviteLink = '${{ secrets.WEBSERIES_INVITE_LINK || 'https://t.me/+FiQ7kG8Ofh5jMDU1' }}'; static const String tmdbApiKey = '${{ secrets.TMDB_API_KEY || 'YOUR_TMDB_API_KEY' }}'; static const String traktApiKey = '${{ secrets.TRAKT_API_KEY || '05553e1be851c22a76f7df2b8a7c29be60cb5038ecbe6e80b2a7587dfb38ea47' }}'; static const String malClientId = '${{ secrets.MAL_CLIENT_ID || '829f046ef3294326127b407137f62c0a' }}'; static const int adminUserId = ${{ secrets.ADMIN_USER_ID || 123456789 }}; static const String updatePublicKey = '${{ secrets.UPDATE_PUBLIC_KEY || 'ed25519-public-key-hex-goes-here' }}'; }" > lib/core/secrets.dart

      - name: Build Linux Application
        run: flutter build linux --release --dart-define=FIREBASE_DB_URL=${{ secrets.FIREBASE_DB_URL }}

      - name: Package Linux Build
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../telstream-linux-x64.tar.gz .
          cd ../../../

      - name: Upload Linux Bundle as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle
          path: ./build/linux/telstream-linux-x64.tar.gz

  create-release:
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-linux]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ./release_assets

      - name: Set up Flutter (for version parsing helper)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Extract App Version from pubspec.yaml
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | cut -d '+' -f 1)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate checksums.txt
        run: |
          cd release_assets
          sha256sum * > checksums.txt
          cd ..

      - name: Generate Changelog
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: python build_changelog.py

      - name: Generate jsDelivr fallback stub
        run: |
          echo "{\"version\": \"$APP_VERSION\", \"build\": $GITHUB_RUN_NUMBER}" > ./release_assets/latest_release.json

      - name: Create Unified GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}-build.${{ github.run_number }}
          name: TelStream Release v${{ env.APP_VERSION }} #${{ github.run_number }}
          body_path: ./extracted_changelog.md
          files: |
            ./release_assets/telstream-arm64.apk
            ./release_assets/telstream-arm32.apk
            ./release_assets/telstream-setup.exe
            ./release_assets/telstream-linux-x64.tar.gz
            ./release_assets/checksums.txt
            ./release_assets/latest_release.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
