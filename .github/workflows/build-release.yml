name: Build & Release Android App

permissions:
  contents: write

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create Secrets file
        run: |
          mkdir -p lib/core
          echo "class Secrets { static const int apiId = ${{ secrets.TELEGRAM_API_ID }}; static const String apiHash = '${{ secrets.TELEGRAM_API_HASH }}'; }" > lib/core/secrets.dart

      - name: Download Prebuilt TDLib Binaries
        run: |
          curl -L -o jniLibs.tar.gz https://github.com/up9cloud/android-libtdjson/releases/download/v1.8.52/jniLibs.tar.gz
          tar -xzf jniLibs.tar.gz -C android/app/src/main

      - name: Build Split APKs (ARM64 and ARM32)
        run: |
          flutter build apk --split-per-abi --target-platform android-arm,android-arm64 --release
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/telstream-arm64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/telstream-arm32.apk

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build.${{ github.run_number }}
          name: TelStream Release #${{ github.run_number }}
          body: |
            Automated build for TelStream.
            
            ### Variants:
            * **ARM64 APK**: Optimized for modern 64-bit ARM devices (arm64-v8a).
            * **ARM32 APK**: Optimized for older 32-bit ARM devices (armeabi-v7a).
            
            *Triggered by commit: ${{ github.sha }}*
          files: |
            build/app/outputs/flutter-apk/telstream-arm64.apk
            build/app/outputs/flutter-apk/telstream-arm32.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
